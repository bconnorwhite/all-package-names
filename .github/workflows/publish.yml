name: Publish

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        type: choice
        options:
          - none
          - alpha
          - beta
          - rc
          - patch
          - minor
          - major
        default: none
      rebuild:
        description: Rebuild package names from npm changes before publishing
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: false
          filter: blob:none
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Resolve publish settings
        id: config
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
          else
            echo "bump=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
            echo "rebuild=${{ inputs.rebuild }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore current release package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build && node ./build/bin/index.js bootstrap --release current

      - name: Bump stable version
        if: steps.config.outputs.bump == 'patch' || steps.config.outputs.bump == 'minor' || steps.config.outputs.bump == 'major'
        run: npm version ${{ steps.config.outputs.bump }} --no-git-tag-version

      - name: Bump prerelease version
        if: steps.config.outputs.bump == 'alpha' || steps.config.outputs.bump == 'beta' || steps.config.outputs.bump == 'rc'
        run: npm version prerelease --preid ${{ steps.config.outputs.bump }} --no-git-tag-version

      - name: Validate release version
        id: version
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          VERSION=$(npx pkgv)
          if printf '%s' "$VERSION" | grep -q -- '-'; then
            RELEASE_KIND="prerelease"
            CHANNEL=$(printf '%s' "$VERSION" | sed -nE 's/^[^-]+-(alpha|beta|rc)\..*/\1/p')
            if [ -z "$CHANNEL" ]; then
              echo "::error::Could not determine prerelease channel from version $VERSION"
              exit 1
            fi
          else
            RELEASE_KIND="stable"
            CHANNEL="stable"
          fi
          if [ "${{ steps.config.outputs.bump }}" = "none" ]; then
            echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.config.outputs.bump }}" = "patch" ] || [ "${{ steps.config.outputs.bump }}" = "minor" ] || [ "${{ steps.config.outputs.bump }}" = "major" ]; then
            if printf '%s' "$VERSION" | grep -q -- '-'; then
              echo "::error::Stable bump produced a prerelease version: $VERSION"
              exit 1
            fi
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          else
            if [ "$CHANNEL" != "${{ steps.config.outputs.bump }}" ]; then
              echo "::error::Current version channel ($CHANNEL) does not match requested channel (${{ steps.config.outputs.bump }})"
              exit 1
            fi
            echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          fi
          if [ "$RELEASE_KIND" = "stable" ] && [ "$BRANCH" != "main" ]; then
            echo "::error::Stable publishes must run from main, got $BRANCH"
            exit 1
          fi
          if [ "$RELEASE_KIND" = "prerelease" ] && [ "$BRANCH" = "main" ]; then
            echo "::error::Prerelease publishes must run from a non-main branch"
            exit 1
          fi
          TAG="v${VERSION}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "release_kind=${RELEASE_KIND}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Rebuild names data
        if: steps.config.outputs.rebuild == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Run coverage
        run: npm run coverage

      - name: Fail if tag exists
        run: |
          if git ls-remote --exit-code --tags origin "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release commit
        run: |
          git add package.json package-lock.json
          git commit --allow-empty -m "${{ steps.version.outputs.tag }}"

      - name: Get release commit SHA
        id: release_commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Pack release artifact
        id: pack
        run: |
          FILE=$(npm pack | tail -n 1)
          echo "file=${FILE}" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: git tag -a "${{ steps.version.outputs.tag }}" -m "${{ steps.version.outputs.tag }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:${{ steps.version.outputs.branch }}
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ github.token }}
          git-branch: ${{ steps.version.outputs.branch }}
          git-commit: ${{ steps.release_commit.outputs.sha }}
          file: coverage/lcov.info
          fail-on-error: false

      - name: Publish stable to npm
        if: steps.version.outputs.release_kind == 'stable'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag latest

      - name: Publish prerelease to npm
        if: steps.version.outputs.release_kind == 'prerelease'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag next

      - name: Create GitHub release
        if: steps.version.outputs.release_kind == 'stable'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "./${{ steps.pack.outputs.file }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Create GitHub prerelease
        if: steps.version.outputs.release_kind == 'prerelease'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "./${{ steps.pack.outputs.file }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --prerelease
