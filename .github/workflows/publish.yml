name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        type: choice
        options:
          - none
          - alpha
          - beta
          - rc
          - patch
          - minor
          - major
        default: none
      rebuild:
        description: Rebuild package names from npm changes before publishing
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Checkout main branch
        run: |
          git fetch origin main
          git checkout main

      - name: Install dependencies
        run: npm ci

      - name: Restore current release package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build && node ./build/bin/index.js bootstrap --release current

      - name: Bump stable version
        if: inputs.bump == 'patch' || inputs.bump == 'minor' || inputs.bump == 'major'
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Bump prerelease version
        if: inputs.bump == 'alpha' || inputs.bump == 'beta' || inputs.bump == 'rc'
        run: npm version prerelease --preid ${{ inputs.bump }} --no-git-tag-version

      - name: Validate release version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          RELEASE_KIND=$(node -e "const version=require('./package.json').version; console.log(version.includes('-') ? 'prerelease' : 'stable');")
          if [ "${{ inputs.bump }}" = "none" ]; then
            if [ "$RELEASE_KIND" = "prerelease" ]; then
              CHANNEL=$(node -e "const version=require('./package.json').version; const match=version.match(/-(alpha|beta|rc)\\./); if(match===null){process.exit(1);} console.log(match[1]);")
              echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
            else
              echo "channel=stable" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${{ inputs.bump }}" = "patch" ] || [ "${{ inputs.bump }}" = "minor" ] || [ "${{ inputs.bump }}" = "major" ]; then
            if printf '%s' "$VERSION" | grep -q -- '-'; then
              echo "::error::Stable bump produced a prerelease version: $VERSION"
              exit 1
            fi
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          else
            CHANNEL=$(node -e "const version=require('./package.json').version; const match=version.match(/-(alpha|beta|rc)\\./); if(match===null){process.exit(1);} console.log(match[1]);")
            if [ "$CHANNEL" != "${{ inputs.bump }}" ]; then
              echo "::error::Current version channel ($CHANNEL) does not match requested channel (${{ inputs.bump }})"
              exit 1
            fi
            echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          fi
          TAG="v${VERSION}"
          echo "release_kind=${RELEASE_KIND}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Rebuild names data
        if: inputs.rebuild
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Run coverage
        run: npm run coverage

      - name: Fail if tag exists
        run: |
          git fetch --tags
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release commit
        run: |
          git add package.json package-lock.json
          git commit --allow-empty -m "${{ steps.version.outputs.tag }}"

      - name: Get release commit SHA
        id: release_commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Pack release artifact
        id: pack
        run: |
          FILE=$(npm pack | tail -n 1)
          echo "file=${FILE}" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: git tag -a "${{ steps.version.outputs.tag }}" -m "${{ steps.version.outputs.tag }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ github.token }}
          git-branch: main
          git-commit: ${{ steps.release_commit.outputs.sha }}
          file: coverage/lcov.info
          fail-on-error: false

      - name: Publish stable to npm
        if: steps.version.outputs.release_kind == 'stable'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag latest

      - name: Publish prerelease to npm
        if: steps.version.outputs.release_kind == 'prerelease'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag next

      - name: Create GitHub release
        if: steps.version.outputs.release_kind == 'stable'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "./${{ steps.pack.outputs.file }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Create GitHub prerelease
        if: steps.version.outputs.release_kind == 'prerelease'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "./${{ steps.pack.outputs.file }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --prerelease
